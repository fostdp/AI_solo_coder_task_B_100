apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: ClickHouse
    uid: clickhouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    editable: true
    secureJsonData:
      password: ""
    jsonData:
      server: clickhouse
      port: 8123
      protocol: http
      defaultDatabase: fenyun_vehicle
      username: default
      tlsSkipVerify: true
