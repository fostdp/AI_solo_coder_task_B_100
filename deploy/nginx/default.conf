upstream fenyun_backend {
    server fenyun-backend:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- 静态资源: 支持 pre-compressed .gz / .br ----
    # brotli_static 和 gzip_static 会优先使用预压缩文件
    brotli_static on;
    gzip_static   on;

    # 浏览器强缓存
    map $uri $cache_control {
        default                              "no-cache";
        ~^.*\.(?:js|css|woff2?|ttf|eot)$    "public, max-age=31536000, immutable";
        ~^.*\.(?:png|jpg|jpeg|gif|webp|ico|svg)$ "public, max-age=2592000";
    }

    # ---------- 根路径和 SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control $cache_control;
    }

    # ---------- 后端 API ----------
    location /api/ {
        proxy_pass         http://fenyun_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS for dev convenience
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        proxy_connect_timeout   10s;
        proxy_buffering         on;
        proxy_buffers           32 8k;
    }

    # ---------- Prometheus metrics (暴露给运维侧) ----------
    location = /metrics {
        proxy_pass         http://fenyun-backend:9091/metrics;
        proxy_set_header   Host              $host;
        access_log         off;
        allow  127.0.0.0/8;
        allow  10.0.0.0/8;
        allow  172.16.0.0/12;
        allow  192.168.0.0/16;
        deny   all;
    }

    # ---------- 安全 & 健康检查 ----------
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "nginx-ok\n";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=864000, immutable";
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        return 200 "User-agent: *\nDisallow: /api/\n";
    }
}
